<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指尖魔法 - 烟花与流光</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020202; /* 极深灰黑，比纯黑更有质感 */
            touch-action: none;
            cursor: none; /* 隐藏鼠标 */
        }
        canvas {
            display: block;
        }
        .hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
            animation: pulse 2s infinite;
            z-index: 10;
        }
        /* 让文字闪烁一下然后消失 */
        .hint.fade {
            transition: opacity 2s;
            opacity: 0;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="hint" id="hint">点一点：放烟花 💥<br>滑一滑：写名字 ✨</div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    // 3秒后隐藏提示文字
    setTimeout(() => {
        hint.classList.add('fade');
    }, 3000);

    let width, height;
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 核心变量
    let particles = [];
    let hue = 0;
    
    // 鼠标/触摸逻辑
    const mouse = { x: undefined, y: undefined };
    const lastMouse = { x: undefined, y: undefined };
    let isDrawing = false;

    // --- 粒子系统 ---
    class Particle {
        // isExplosion: true=爆炸烟花, false=拖尾流光
        constructor(x, y, hue, isExplosion) {
            this.x = x;
            this.y = y;
            this.isExplosion = isExplosion;
            
            // 颜色策略
            const colorVar = Math.random() * 60 - 30;
            // 爆炸时颜色更亮，拖尾时有一半是白色
            if (isExplosion) {
                // 爆炸全是彩色，且亮度高
                this.color = `hsl(${hue + colorVar}, 100%, 60%)`;
                this.size = Math.random() * 3 + 1; // 爆炸粒子稍大
                this.decay = Math.random() * 0.015 + 0.01; // 消失慢一点
            } else {
                // 拖尾
                this.color = Math.random() > 0.5 ? `hsl(${hue + colorVar}, 100%, 70%)` : '#fff'; 
                this.size = Math.random() * 2 + 0.5;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            // 物理属性：爆炸要快，拖尾要慢
            const angle = Math.random() * Math.PI * 2;
            let speed;
            
            if (isExplosion) {
                // 爆炸速度快，范围大
                speed = Math.random() * 10 + 2; 
                this.gravity = 0.15; // 爆炸后下坠感明显
                this.friction = 0.96;
            } else {
                // 拖尾速度慢，聚拢
                speed = Math.random() * 1.5 + 0.2; 
                this.gravity = 0.02; // 几乎飘在空中
                this.friction = 0.95;
            }
            
            this.speedX = Math.cos(angle) * speed;
            this.speedY = Math.sin(angle) * speed;
            this.life = 1;
        }

        update() {
            this.speedX *= this.friction;
            this.speedY *= this.friction;
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // --- 功能1：点击产生爆炸 ---
    function createExplosion(x, y) {
        const particleCount = 80; // 爆炸粒子数量
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(x, y, hue, true)); // true = 爆炸模式
        }
    }

    // --- 功能2：滑动产生拖尾（插值算法） ---
    function createTrail(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const stepSize = 4; // 密度
        const steps = distance / stepSize;

        for (let i = 0; i <= steps; i++) {
            const x = x1 + (dx / steps) * i;
            const y = y1 + (dy / steps) * i;
            // 每个点生成2个粒子
            for(let k=0; k<2; k++){
                particles.push(new Particle(x, y, hue, false)); // false = 拖尾模式
            }
        }
    }

    function animate() {
        // 1. 设置画布背景，产生长拖尾效果
        // 如果想拖尾更长，把 0.1 改成 0.05
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.01)'; 
        ctx.fillRect(0, 0, width, height);

        // 2. 开启发光模式
        ctx.globalCompositeOperation = 'lighter';

        // 3. 更新所有粒子
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();

            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }

        hue += 1; // 整体颜色流转
        requestAnimationFrame(animate);
    }

    // --- 事件监听 ---

    // 开始（按下）
    function onStart(x, y) {
        isDrawing = true;
        lastMouse.x = x;
        lastMouse.y = y;
        mouse.x = x;
        mouse.y = y;
        
        // 重点：按下瞬间，直接炸开！💥
        createExplosion(x, y);
        // 同时也产生一点拖尾起始点
        createTrail(x, y, x, y);
    }

    // 移动（拖动）
    function onMove(x, y) {
        if (!isDrawing) return;
        createTrail(lastMouse.x, lastMouse.y, x, y);
        lastMouse.x = x;
        lastMouse.y = y;
    }

    // 结束（松开）
    function onEnd() {
        isDrawing = false;
        lastMouse.x = undefined;
        lastMouse.y = undefined;
    }

    // 适配鼠标
    canvas.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    canvas.addEventListener('mouseup', onEnd);

    // 适配触屏 (支持多点触控爆炸)
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.touches.length; i++) {
            const t = e.touches[i];
            // 对每个新按下的手指都产生爆炸
            // 这里简单处理：以第一个手指为拖尾主控，但所有手指都能触发点击爆炸
            if (i === 0) onStart(t.clientX, t.clientY);
            else createExplosion(t.clientX, t.clientY);
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        // 只跟随第一根手指画线，防止过于混乱
        onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});
    
    canvas.addEventListener('touchend', onEnd);

    animate();
</script>
</body>
</html>
